version: '3.8'

services:
  db:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend-node
    ports:
      - "3001:3001"
    environment:
      # Use internal docker networking
      - MONGO_URI=mongodb://db:27017
      - MONGO_DB_NAME=precisely
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db

  frontend:
    build: ./dashboard
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend

volumes:
  mongo_data:
